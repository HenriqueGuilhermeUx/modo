services:
  - type: web
    name: modo-api
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build --workspace=@modo/contracts && npm run build --workspace=@modo/api
    startCommand: npm run start --workspace=@modo/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PUBLIC_API_URL
        value: https://modo-api-3m10.onrender.com
      - key: PUBLIC_WEB_URL
        value: https://modo1.netlify.app
      - key: ALLOWED_ORIGINS
        value: https://modo1.netlify.app,http://localhost:5173
      - key: DIAGNOSTIC_PROVIDER
        value: demo
      - key: DEMO_DIAGNOSTIC_DELAY_MS
        value: 2600
      - key: CONTENT_PROVIDER
        sync: false
      - key: CONTENT_DEMO_DELAY_MS
        value: 1800
      - key: N8N_CONTENT_WEBHOOK_URL
        sync: false
      - key: N8N_CONTENT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: false
      - key: AUTH_SESSION_DAYS
        value: 30
      - key: ENABLE_DEMO_BILLING
        value: false
      - key: PAYMENTS_PROVIDER
        sync: false
      - key: WOOVI_APP_ID
        sync: false
      - key: WOOVI_WEBHOOK_AUTHORIZATION
        sync: false
      - key: PLATFORM_ADMIN_EMAIL
        sync: false
      - key: PLATFORM_ADMIN_PASSWORD
        sync: false
      - key: PLATFORM_ADMIN_NAME
        value: Administrador MODO
      - key: PLATFORM_ADMIN_SESSION_HOURS
        value: 12
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        value: https://modo-api-3m10.onrender.com/api/v1/linkedin/callback
      - key: LINKEDIN_SCOPES
        value: r_liteprofile w_member_social
      - key: LINKEDIN_TOKEN_ENCRYPTION_SECRET
        sync: false
      - key: LINKEDIN_API_VERSION
        value: 202606
