name: Diagnose Consumer Tests
on:
  pull_request:
    branches: [main]
jobs:
  diagnose:
    if: github.head_ref == 'ci/diagnose-consumer-tests'
    runs-on: ubuntu-latest
    steps:
      - name: Run tests and show only the failure tail
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          git clone --quiet --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git" repo
          cd repo
          git fetch --quiet --depth 1 origin "${HEAD_SHA}"
          git checkout --quiet "${HEAD_SHA}"
          npm install --include=dev --silent
          npm test --silent > /tmp/modo-tests.log 2>&1
          status=$?
          tail -n 140 /tmp/modo-tests.log
          exit $status
