[build]
  base = "."
  command = "npm run build --workspace=@modo/contracts && npm run build --workspace=@modo/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"
  VITE_API_URL = "https://modo-api-3m10.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
