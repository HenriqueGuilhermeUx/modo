name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply_impact_diagnostic:
    if: github.event_name == 'pull_request' && github.head_ref == 'ci/trigger-impact-first-diagnostic-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Apply impact-first result to main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -e
          git clone --quiet --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git" repo
          cd repo
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('apps/web/src/App.tsx')
          text = path.read_text()
          import_line = 'import DiagnosticImpactResult from "./DiagnosticImpactResult";\n'
          anchor = 'import { captureLead, createDiagnostic, getDiagnostic } from "./api";\n'
          if import_line not in text:
              if anchor not in text:
                  raise SystemExit('App import anchor not found')
              text = text.replace(anchor, anchor + import_line)

          replacement = '''        {result && <DiagnosticImpactResult
          result={result}
          campaigns={campaigns}
          leadCaptured={leadCaptured}
          leadLoading={leadLoading}
          name={name}
          contact={contact}
          sectionRef={resultRef}
          onNameChange={setName}
          onContactChange={setContact}
          onLeadSubmit={handleLead}
          onActivate={() => activatePlan("presenca")}
        />}

        <section className="how-section container"'''

          pattern = re.compile(
              r'        \{result && <section className="result-section"[\s\S]*?\n        <section className="how-section container"',
              re.MULTILINE,
          )
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Expected one diagnostic result block, replaced {count}')
          path.write_text(text)
          PY
          git config user.name "MODO CI"
          git config user.email "actions@github.com"
          git add apps/web/src/App.tsx
          git commit -m "make first diagnostic result specific and compelling"
          git push origin HEAD:main

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --include=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
